<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>🎮 Frans Game Arcade</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- Animated Background -->
        <div class="bg-animation">
            <div class="stars"></div>
            <div class="stars2"></div>
            <div class="stars3"></div>
        </div>

        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="logo">
                <span class="logo-icon">🎮</span>
                <span class="logo-text">FRANS<br>ARCADE</span>
            </div>
            
            <ul class="game-list" id="nav">
                <li>
                    <a href="#bounce" data-game="bounce" class="game-card selected" data-emoji="🏓">
                        <span class="game-icon">🏓</span>
                        <span class="game-name">Bounce</span>
                        <span class="game-badge">Classic</span>
                    </a>
                </li>
                <li>
                    <a href="#snake" data-game="snake" class="game-card" data-emoji="🐍">
                        <span class="game-icon">🐍</span>
                        <span class="game-name">Snake</span>
                        <span class="game-badge">Retro</span>
                    </a>
                </li>
                <li>
                    <a href="#tetris" data-game="tetris" class="game-card" data-emoji="🧱">
                        <span class="game-icon">🧱</span>
                        <span class="game-name">Tetris</span>
                        <span class="game-badge">Legend</span>
                    </a>
                </li>
                <li>
                    <a href="#defender" data-game="defender" class="game-card" data-emoji="🛡️">
                        <span class="game-icon">🛡️</span>
                        <span class="game-name">Defender</span>
                        <span class="game-badge">Strategy</span>
                    </a>
                </li>
                <li>
                    <a href="#pacman" data-game="pacman" class="game-card" data-emoji="👻">
                        <span class="game-icon">👻</span>
                        <span class="game-name">Pacman</span>
                        <span class="game-badge">Arcade</span>
                    </a>
                </li>
                <li>
                    <a href="#puzzle" data-game="puzzle" class="game-card" data-emoji="🧩">
                        <span class="game-icon">🧩</span>
                        <span class="game-name">Puzzle</span>
                        <span class="game-badge">Brain</span>
                    </a>
                </li>
                <li>
                    <a href="#spider" data-game="spider" class="game-card" data-emoji="🕷️">
                        <span class="game-icon">🕷️</span>
                        <span class="game-name">Spider</span>
                        <span class="game-badge">Cards</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <p>Made with ❤️</p>
            </div>
        </nav>

        <!-- Toggle Button for Mobile -->
        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Main Game Area -->
        <main class="game-container">
            <header class="game-header">
                <div class="current-game">
                    <span class="current-emoji" id="currentEmoji">🏓</span>
                    <h1 id="title">Bounce</h1>
                </div>
                <div class="header-actions">
                    <span class="live-badge">🔴 LIVE</span>
                </div>
            </header>
            <div class="game-wrapper">
                <iframe id="machine"></iframe>
            </div>
        </main>

        <script>
            const gameEmojis = {
                bounce: '🏓',
                snake: '🐍',
                tetris: '🧱',
                defender: '🛡️',
                pacman: '👻',
                puzzle: '🧩',
                spider: '🕷️'
            };

            function play(game) {
                "use strict";
                const prevSelected = document.querySelector("#nav li a.selected");
                if (prevSelected) prevSelected.classList.remove("selected");
                
                const newSelected = document.querySelector(`#nav li a[data-game=${game}]`);
                if (newSelected) newSelected.classList.add("selected");
                
                document.getElementById("title").innerHTML = game.charAt(0).toUpperCase() + game.slice(1);
                document.getElementById("currentEmoji").innerHTML = gameEmojis[game] || '🎮';
                document.getElementById("machine").src = `${game}/index.html`;
                document.title = "🎮 Frans Arcade: " + game.charAt(0).toUpperCase() + game.slice(1);
                
                // Close sidebar on mobile after selection
                if (window.innerWidth <= 768) {
                    document.getElementById("sidebar").classList.remove("open");
                    document.getElementById("menuToggle").classList.remove("active");
                }
            }

            window.addEventListener("load", () => {
                "use strict";
                play(location.hash.substring(1) || "bounce");
                
                document.querySelector("#nav").addEventListener("click", (e) => {
                    const card = e.target.closest('.game-card');
                    if (card && card.dataset.game) {
                        e.preventDefault();
                        play(card.dataset.game);
                    }
                });

                // Mobile menu toggle
                document.getElementById("menuToggle").addEventListener("click", () => {
                    document.getElementById("sidebar").classList.toggle("open");
                    document.getElementById("menuToggle").classList.toggle("active");
                });
            }, false);
        </script>
    </body>
</html>
